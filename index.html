<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inventory">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f172a'/><text x='50' y='68' font-size='60' text-anchor='middle'>📦</text></svg>">
<title>Warehouse Inventory</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=DM+Mono:wght@400;500;700&display=swap');

  /* ===== DARK THEME (default) ===== */
  :root, [data-theme="dark"] {
    --bg: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #0f172a;
    --border: #334155;
    --border-soft: #ffffff0a;
    --text: #e2e8f0;
    --text-bright: #f8fafc;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --text-faint: #475569;
    --accent: #f59e0b;
    --accent-soft: #f59e0b22;
    --accent-line: #f59e0b33;
    --green: #16a34a;
    --green-soft: #16a34a18;
    --green-line: #16a34a44;
    --blue: #3b82f6;
    --blue-soft: #3b82f618;
    --blue-line: #3b82f644;
    --blue-text: #60a5fa;
    --red: #ef4444;
    --red-soft: #ef444418;
    --red-line: #ef444444;
    --purple: #818cf8;
    --bottom-fade: linear-gradient(to top, #0f172a 75%, #0f172a00);
    --shadow: 0 20px 60px #000000aa;
    --shadow-toast: 0 8px 32px #00000066;
    --modal-overlay: #000000cc;
  }

  /* ===== LIGHT THEME ===== */
  [data-theme="light"] {
    --bg: #f8fafc;
    --bg-card: #ffffff;
    --bg-input: #f1f5f9;
    --border: #e2e8f0;
    --border-soft: #00000008;
    --text: #1e293b;
    --text-bright: #0f172a;
    --text-muted: #475569;
    --text-dim: #64748b;
    --text-faint: #94a3b8;
    --accent: #d97706;
    --accent-soft: #f59e0b22;
    --accent-line: #f59e0b66;
    --green: #15803d;
    --green-soft: #16a34a18;
    --green-line: #16a34a55;
    --blue: #2563eb;
    --blue-soft: #3b82f618;
    --blue-line: #3b82f655;
    --blue-text: #2563eb;
    --red: #dc2626;
    --red-soft: #ef444418;
    --red-line: #ef444466;
    --purple: #6366f1;
    --bottom-fade: linear-gradient(to top, #f8fafc 75%, #f8fafc00);
    --shadow: 0 20px 60px #00000022;
    --shadow-toast: 0 8px 32px #00000022;
    --modal-overlay: #00000066;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { height: 100%; overscroll-behavior: none; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); transition: background 0.2s, color 0.2s; }
  input, button, select, textarea { font-family: inherit; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent) !important; outline: none; }
  button:disabled { opacity: 0.35; }
  button { cursor: pointer; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .mono { font-family: 'DM Mono', monospace; }

  .shell { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 90px; }
  .toast { position: fixed; top: calc(env(safe-area-inset-top) + 12px); left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 8px 22px; border-radius: 30px; font-size: 13px; font-weight: 600; z-index: 999; box-shadow: var(--shadow-toast); animation: fadeIn 0.2s ease; }

  header { background: var(--bg); padding: 14px 16px 10px; border-bottom: 1px solid var(--accent-line); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-bright); }
  .subtitle { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent); font-family: 'DM Mono', monospace; margin-top: 1px; }
  .gear-btn, .theme-btn { background: none; border: none; font-size: 18px; padding: 2px; color: var(--text-muted); }
  .save-dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.3s; background: var(--green); display: inline-block; }
  .save-dot.saving { background: var(--accent); }
  .save-dot.error { background: var(--red); }
  .back-btn { background: none; border: none; color: var(--text-muted); font-size: 14px; padding: 4px 0; }

  .quick-add { margin: 12px 14px; padding: 14px; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); }
  .quick-add-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .quick-title { font-size: 13px; font-weight: 800; color: var(--accent); font-family: 'DM Mono', monospace; letter-spacing: 0.04em; }
  .kb-toggle { padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-muted); font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 700; }
  .prov-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .prov-chip { padding: 7px 14px; border-radius: 10px; border: 2px solid var(--border); background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 700; transition: all 0.15s; }
  .prov-chip.active { background: var(--c, var(--accent))22; border-color: var(--c, var(--accent)); color: var(--c, var(--accent)); }
  .input-row { display: flex; gap: 8px; }
  .input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 15px; outline: none; }
  .input.flex2 { flex: 2; }
  .input.flex1 { flex: 1; }
  .input.small { font-size: 13px; margin-top: 8px; }
  .quick-add-btn { padding: 10px 16px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-size: 18px; font-weight: 900; flex-shrink: 0; }

  .stats-row { display: flex; gap: 8px; padding: 8px 14px; flex-wrap: wrap; }
  .stat-chip { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted); background: var(--bg-card); padding: 5px 12px; border-radius: 8px; }
  .stat-chip.pending { background: var(--accent-soft); color: var(--accent); }
  .stat-chip.done { background: var(--green-soft); color: var(--green); }
  .stat-chip strong { font-weight: 800; margin-right: 3px; }

  .filter-row { display: flex; gap: 6px; padding: 0 14px 8px; }
  .filter-input { flex: 1; font-size: 13px; }
  .filter-select { flex: 0; min-width: 90px; font-size: 12px; padding: 8px 4px; }

  .list { padding: 0 14px; padding-bottom: 100px; }
  .empty { text-align: center; padding: 40px 20px; }
  .empty-emoji { font-size: 44px; }
  .empty-text { color: var(--text-dim); margin-top: 10px; font-size: 14px; }
  .empty-sub { color: var(--text-faint); font-size: 12px; margin-top: 4px; }

  .card { background: var(--bg-card); border-radius: 12px; padding: 11px 14px; margin-bottom: 6px; border: 1px solid var(--border); }
  .card-row { display: flex; align-items: center; justify-content: space-between; }
  .card-main { flex: 1; min-width: 0; }
  .card-line1 { display: flex; align-items: center; gap: 8px; }
  .prov-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .part-num { font-size: 14px; font-weight: 800; color: var(--text-bright); font-family: 'DM Mono', monospace; letter-spacing: 0.02em; }
  .qty-badge { background: var(--accent-soft); color: var(--accent); font-weight: 800; font-size: 11px; padding: 2px 7px; border-radius: 6px; font-family: 'DM Mono', monospace; }
  .item-name { font-size: 13px; color: var(--text-muted); margin-top: 3px; margin-left: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pending-label { font-size: 12px; color: var(--text-dim); margin-top: 3px; margin-left: 18px; font-style: italic; }
  .card-meta { font-size: 10px; color: var(--text-faint); font-family: 'DM Mono', monospace; margin-top: 2px; margin-left: 18px; }
  .card-prices { text-align: right; }
  .orig-price { font-size: 11px; color: var(--text-dim); text-decoration: line-through; font-family: 'DM Mono', monospace; }
  .sale-price { font-size: 15px; font-weight: 800; color: var(--green); font-family: 'DM Mono', monospace; }
  .no-price { color: var(--text-faint); font-size: 12px; font-family: 'DM Mono', monospace; }

  .modal-overlay { position: fixed; inset: 0; background: var(--modal-overlay); z-index: 900; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: var(--bg-card); border-radius: 18px; padding: 22px 20px; max-width: 380px; width: 100%; border: 1px solid var(--border); box-shadow: var(--shadow); max-height: 90vh; overflow-y: auto; }
  .modal-title { color: var(--text-bright); font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .modal-text { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; line-height: 1.5; }
  code { background: var(--bg-input); padding: 2px 6px; border-radius: 4px; font-size: 11px; color: var(--accent); font-family: 'DM Mono', monospace; }
  .tip-box { background: var(--blue-soft); border: 1px solid var(--blue-line); border-radius: 10px; padding: 10px 12px; font-size: 13px; color: var(--text-muted); margin-top: 8px; }
  .tip-box strong { color: var(--blue-text); }
  .tip-box ol { margin: 6px 0 0; padding-left: 18px; color: var(--text-muted); font-size: 12px; line-height: 1.6; }
  .tip-box em { color: var(--accent); font-style: italic; }
  .tip-box.warning { background: var(--red-soft); border-color: var(--red-line); }
  .stats-box { display: flex; justify-content: space-around; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-top: 12px; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text-muted); text-align: center; }

  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 10px 14px calc(10px + env(safe-area-inset-bottom)) 14px; background: var(--bottom-fade); display: flex; gap: 8px; justify-content: flex-end; }
  .icon-btn { padding: 13px 14px; border-radius: 14px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 16px; }
  .export-btn { flex: 1; padding: 14px 0; border-radius: 14px; border: none; background: var(--blue); color: #fff; font-size: 14px; font-weight: 800; }
  .primary-btn { padding: 13px 0; border-radius: 14px; border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 800; }
  .cancel-btn { padding: 12px 0; border-radius: 14px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 14px; font-weight: 600; }

  .form-wrap { padding: 16px; }
  .form-title { font-size: 20px; font-weight: 800; color: var(--text-bright); margin-bottom: 14px; }
  .label { display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; margin-top: 14px; font-family: 'DM Mono', monospace; }
  textarea { min-height: 50px; resize: vertical; }
  .form-actions { display: flex; gap: 8px; margin-top: 22px; }
  .delete-btn { padding: 13px 16px; border-radius: 14px; border: 1px solid var(--red-line); background: var(--red-soft); color: var(--red); font-size: 14px; font-weight: 600; }

  .prov-list-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-soft); }
  .prov-remove { background: none; border: none; color: var(--red); font-size: 16px; padding: 2px 6px; }

  .install-banner { background: var(--blue-soft); border: 1px solid var(--blue-line); border-radius: 12px; padding: 12px 14px; margin: 12px 14px 0; font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .install-banner strong { color: var(--blue-text); }
  .install-banner button { background: none; border: none; color: var(--text-muted); font-size: 14px; float: right; padding: 0; }

  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .load-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style>
</head>
<body>
<div id="root"><div class="load-wrap"><div class="spinner"></div></div></div>

<script>
// ============== STORAGE — uses localStorage which truly persists ==============
const STORAGE_KEY = "warehouse-inv-v1";
const PROVIDERS_KEY = "warehouse-providers-v1";
const KEYBOARD_KEY = "warehouse-kb-pref-v1";
const THEME_KEY = "warehouse-theme-v1";
const INSTALL_DISMISSED = "warehouse-install-dismissed";
const DEFAULT_PROVIDERS = ["Automann", "Atro Bushing", "PAI Industries", "UP", "S&S", "PDI", "Dayton Parts", "Rev HD", "EZ", "Eaton", "Velvac", "Spicer", "Buyers", "KTC", "Wilson", "Kit Masters", "SAP", "IPD", "BBB", "National"];

const fmt = n => "$" + Number(n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const escapeHtml = s => String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);

// ============== APP STATE ==============
const state = {
  items: [],
  providers: [...DEFAULT_PROVIDERS],
  view: "list",
  editId: null,
  search: "",
  filterProv: "All",
  toast: "",
  toastTimer: null,
  saveStatus: "saved",
  selectedProvider: DEFAULT_PROVIDERS[0],
  newProvider: "",
  showExportModal: false,
  showImportModal: false,
  showInstallBanner: false,
  partKeyboard: "numeric",
  theme: "dark",
  partNum: "",
  qty: "",
  location: "",
  editForm: { name: "", partNumber: "", qty: "", price: "", provider: "", location: "", notes: "" },
};

// ============== LOAD ==============
function load() {
  try { const v = localStorage.getItem(STORAGE_KEY); if (v) state.items = JSON.parse(v); } catch {}
  try {
    const v = localStorage.getItem(PROVIDERS_KEY);
    if (v) {
      const saved = JSON.parse(v);
      const merged = [...saved];
      DEFAULT_PROVIDERS.forEach(dp => { if (!merged.includes(dp)) merged.push(dp); });
      state.providers = merged;
    }
  } catch {}

  // Auto-rename old names to new format
  const renameMap = {
    "EATON": "Eaton", "eaton": "Eaton",
    "KIT MASTERS": "Kit Masters", "kit masters": "Kit Masters", "Kit masters": "Kit Masters",
    "NATIONAL": "National", "national": "National",
    "wilson": "Wilson", "WILSON": "Wilson",
    "AUTOMANN": "Automann", "automann": "Automann",
    "VELVAC": "Velvac", "velvac": "Velvac",
    "SPICER": "Spicer", "spicer": "Spicer",
    "BUYERS": "Buyers", "buyers": "Buyers",
    "DAYTON PARTS": "Dayton Parts", "dayton parts": "Dayton Parts",
    "REV HD": "Rev HD", "rev hd": "Rev HD",
    "PAI INDUSTRIES": "PAI Industries", "pai industries": "PAI Industries",
    "ATRO BUSHING": "Atro Bushing", "atro bushing": "Atro Bushing",
  };
  let renamed = false;
  state.providers = state.providers.map(p => {
    if (renameMap[p]) { renamed = true; return renameMap[p]; }
    return p;
  });
  // Remove duplicates after renaming
  state.providers = [...new Set(state.providers)];
  // Rename in items too
  state.items.forEach(it => {
    if (it.provider && renameMap[it.provider]) {
      it.provider = renameMap[it.provider];
      renamed = true;
    }
  });
  if (renamed) { saveProviders(); saveItems(); }

  try { const v = localStorage.getItem(KEYBOARD_KEY); if (v) state.partKeyboard = v; } catch {}
  try { const v = localStorage.getItem(THEME_KEY); if (v === "light" || v === "dark") state.theme = v; } catch {}
  state.selectedProvider = state.providers[0] || "";
  document.documentElement.setAttribute("data-theme", state.theme);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute("content", state.theme === "light" ? "#f8fafc" : "#0f172a");
  const dismissed = localStorage.getItem(INSTALL_DISMISSED);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (!dismissed && !isStandalone) state.showInstallBanner = true;
  saveProviders();
}

function toggleTheme() {
  state.theme = state.theme === "dark" ? "light" : "dark";
  try { localStorage.setItem(THEME_KEY, state.theme); } catch {}
  document.documentElement.setAttribute("data-theme", state.theme);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute("content", state.theme === "light" ? "#f8fafc" : "#0f172a");
  render();
}

// ============== SAVE — instant, every change ==============
function save(key, val) {
  try {
    state.saveStatus = "saving";
    localStorage.setItem(key, val);
    state.saveStatus = "saved";
  } catch { state.saveStatus = "error"; }
}
function saveItems() { save(STORAGE_KEY, JSON.stringify(state.items)); }
function saveProviders() { save(PROVIDERS_KEY, JSON.stringify(state.providers)); }

// ============== TOAST ==============
function showToast(msg) {
  state.toast = msg;
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(() => { state.toast = ""; render(); }, 2000);
  render();
}

function selectProvider(name) {
  state.selectedProvider = name;
  // Update chip styles in-place without full re-render (keeps keyboard open)
  document.querySelectorAll('.quick-add .prov-chip').forEach(chip => {
    if (chip.dataset.prov === name) {
      chip.classList.add('active');
      chip.style.setProperty('--c', providerColor(name));
    } else {
      chip.classList.remove('active');
    }
  });
  updateAddBtn();
}

// ============== LIVE INPUT (updates button state without re-render to keep keyboard open) ==============
function updateAddBtn() {
  const btn = document.getElementById("add-btn");
  if (btn) {
    if (state.partNum.trim() && state.qty && state.selectedProvider) btn.removeAttribute("disabled");
    else btn.setAttribute("disabled", "");
  }
}
function onPartInput(v) {
  state.partNum = v;
  updateAddBtn();
}
function onQtyInput(v) {
  const cleaned = v.replace(/[^0-9]/g, "");
  state.qty = cleaned;
  // If we stripped characters, update the input
  const el = document.getElementById("qty-input");
  if (el && el.value !== cleaned) el.value = cleaned;
  updateAddBtn();
}

// ============== ACTIONS ==============
function quickAdd() {
  if (!state.partNum.trim() || !state.qty) return;
  const partNumber = state.partNum.trim().toUpperCase();
  const addQty = Number(state.qty);
  const provider = state.selectedProvider;

  // ===== AUTO-MERGE: same provider + same part # =====
  const existing = state.items.find(it =>
    it.provider === provider && (it.partNumber || "").toUpperCase() === partNumber
  );
  if (existing) {
    const oldQty = existing.qty;
    existing.qty = oldQty + addQty;
    if (!existing.location && state.location.trim()) {
      existing.location = state.location.trim();
    }
    saveItems();
    showToastInPlace(`#${partNumber}: ${oldQty} → ${existing.qty} (+${addQty})`);
  } else {
    state.items.push({
      id: uid(), partNumber: partNumber, qty: addQty,
      provider: provider, location: state.location.trim(),
      name: "", price: 0, notes: "", created: Date.now(), needsLookup: true
    });
    saveItems();
    showToastInPlace(`#${partNumber} saved`);
  }

  // Clear inputs WITHOUT re-rendering (keeps keyboard open & focus)
  state.partNum = ""; state.qty = "";
  const partInput = document.getElementById("part-input");
  const qtyInput = document.getElementById("qty-input");
  if (partInput) { partInput.value = ""; }
  if (qtyInput) { qtyInput.value = ""; }
  updateAddBtn();

  // First item needs full render (to show search bar, bottom buttons)
  if (state.items.length === 1) {
    render();
    return;
  }

  // Only update the list + stats, not the whole page
  renderListOnly();
  updateStats();
  updateBottomBar();

  // Focus stays on part input naturally since we didn't destroy it
  if (partInput) partInput.focus();
}

// Show toast without full re-render
function showToastInPlace(msg) {
  let toastEl = document.getElementById("live-toast");
  if (!toastEl) {
    toastEl = document.createElement("div");
    toastEl.id = "live-toast";
    toastEl.className = "toast";
    document.body.appendChild(toastEl);
  }
  toastEl.textContent = msg;
  toastEl.style.display = "block";
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(() => { toastEl.style.display = "none"; }, 2000);
}

// Update stats bar without full re-render
function updateStats() {
  const el = document.getElementById("stats-bar");
  if (!el) return;
  const pending = state.items.filter(it => it.needsLookup || !it.price || !it.name).length;
  const done = state.items.length - pending;
  const totalSale = state.items.filter(it => it.price).reduce((s,it) => s + it.price * 0.5 * it.qty, 0);
  el.innerHTML = `
    <div class="stat-chip"><strong>${state.items.length}</strong> items</div>
    ${pending > 0 ? `<div class="stat-chip pending"><strong>${pending}</strong> pending</div>` : ""}
    ${done > 0 ? `<div class="stat-chip done"><strong>${done}</strong> priced</div>` : ""}
    ${totalSale > 0 ? `<div class="stat-chip done">${fmt(totalSale)}</div>` : ""}
  `;
}

// Update bottom bar without full re-render
function updateBottomBar() {
  const el = document.getElementById("bottom-bar");
  if (!el) return;
  el.innerHTML = `
    <button class="icon-btn" onclick="state.showImportModal=true;render()" title="Load from file">📤</button>
    ${state.items.length > 0 ? `<button class="icon-btn" onclick="clearAll()">🗑️</button>` : ""}
    <button class="export-btn" ${state.items.length === 0 ? 'disabled' : ''} onclick="${state.items.length > 0 ? 'state.showExportModal=true;render()' : ''}">
      📥 Save to File
    </button>
  `;
}

function startEdit(id) {
  const it = state.items.find(x => x.id === id); if (!it) return;
  state.editForm = { name: it.name||"", partNumber: it.partNumber, qty: String(it.qty), price: it.price?String(it.price):"", provider: it.provider, location: it.location||"", notes: it.notes||"" };
  state.editId = id; state.view = "edit"; render();
}

function saveEdit() {
  state.items = state.items.map(it => it.id === state.editId ? {
    ...it,
    name: state.editForm.name.trim(),
    partNumber: state.editForm.partNumber.trim().toUpperCase(),
    qty: Number(state.editForm.qty),
    price: Number(state.editForm.price) || 0,
    provider: state.editForm.provider,
    location: state.editForm.location.trim(),
    notes: state.editForm.notes.trim(),
    needsLookup: !state.editForm.price || !state.editForm.name.trim()
  } : it);
  saveItems(); showToast("Updated!"); state.editId = null; state.view = "list"; render();
}

function deleteItem(id) {
  state.items = state.items.filter(it => it.id !== id);
  saveItems(); showToast("Removed");
  if (state.editId === id) { state.editId = null; state.view = "list"; }
  render();
}

function addProvider() {
  const name = state.newProvider.trim();
  if (!name || state.providers.includes(name)) return;
  state.providers.push(name); saveProviders();
  state.newProvider = ""; showToast(`"${name}" added`); render();
}

function removeProvider(name) {
  state.providers = state.providers.filter(p => p !== name);
  saveProviders(); showToast("Removed"); render();
}

function clearAll() {
  if (!confirm("Clear ALL items? This cannot be undone.")) return;
  state.items = []; saveItems(); showToast("Cleared"); render();
}

function exportFile() {
  const data = { version: 1, exported: new Date().toISOString(), sale: "50% OFF CLEARANCE", providers: state.providers, items: state.items };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `warehouse-inventory-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("📥 File downloaded!");
  state.showExportModal = false; render();
}

function importFile(e) {
  const file = e.target.files?.[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.items || !Array.isArray(data.items)) { alert("Invalid file"); return; }
      if (state.items.length > 0 && !confirm(`Import ${data.items.length} items? This REPLACES your current ${state.items.length} items.`)) return;
      state.items = data.items;
      if (data.providers) state.providers = [...new Set([...state.providers, ...data.providers])];
      saveItems(); saveProviders();
      showToast(`✓ Imported ${data.items.length} items!`);
      state.showImportModal = false; render();
    } catch (err) { alert("Could not read file: " + err.message); }
  };
  reader.readAsText(file);
  e.target.value = "";
}

function dismissInstall() {
  localStorage.setItem(INSTALL_DISMISSED, "1");
  state.showInstallBanner = false; render();
}

function setKeyboard(kb) {
  state.partKeyboard = kb;
  try { localStorage.setItem(KEYBOARD_KEY, kb); } catch {}
  render();
  setTimeout(() => document.getElementById("part-input")?.focus(), 50);
}

// ============== HELPERS ==============
function providerColor(name) {
  const c = {
    "Automann": "#f59e0b", "Atro Bushing": "#818cf8", "PAI Industries": "#10b981",
    "UP": "#ef4444", "S&S": "#06b6d4", "PDI": "#f472b6", "Dayton Parts": "#a78bfa",
    "Rev HD": "#fb923c", "EZ": "#22d3ee", "Eaton": "#4ade80", "Velvac": "#c084fc",
    "Spicer": "#fbbf24", "Buyers": "#34d399", "KTC": "#f87171", "Wilson": "#60a5fa",
    "Kit Masters": "#a3e635", "SAP": "#2dd4bf", "IPD": "#e879f9", "BBB": "#fcd34d",
    "National": "#94a3b8"
  };
  if (c[name]) return c[name];
  let h = 0; for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${h % 360}, 60%, 55%)`;
}

function getFiltered() {
  return state.items.filter(it => {
    const ms = (it.partNumber||"").toLowerCase().includes(state.search.toLowerCase()) || (it.name||"").toLowerCase().includes(state.search.toLowerCase());
    const mp = state.filterProv === "All" || it.provider === state.filterProv;
    return ms && mp;
  });
}

// ============== RENDER ==============
function renderItemList(filtered) {
  if (filtered.length === 0 && state.items.length === 0) {
    return `<div class="empty"><div class="empty-emoji">📋</div><div class="empty-text">Enter part numbers above to start</div><div class="empty-sub">Or 📤 import a saved file below</div></div>`;
  }
  if (filtered.length === 0) {
    return `<div class="empty"><div class="empty-emoji">🔍</div><div class="empty-text">No match found</div></div>`;
  }
  return filtered.map(item => `
    <div class="card" onclick="startEdit('${item.id}')">
      <div class="card-row">
        <div class="card-main">
          <div class="card-line1">
            <span class="prov-dot" style="background:${providerColor(item.provider)}"></span>
            <span class="part-num">#${escapeHtml(item.partNumber)}</span>
            <span class="qty-badge">×${item.qty}</span>
          </div>
          ${item.name ? `<div class="item-name">${escapeHtml(item.name)}</div>` : `<div class="pending-label">⏳ Pending lookup</div>`}
          <div class="card-meta">${escapeHtml(item.provider)}${item.location ? ` · 📍${escapeHtml(item.location)}` : ""}</div>
        </div>
        <div class="card-prices">
          ${item.price ? `
            <div class="orig-price">${fmt(item.price)}</div>
            <div class="sale-price">${fmt(item.price * 0.5)}</div>
          ` : `<div class="no-price">—</div>`}
        </div>
      </div>
    </div>
  `).join("");
}

function onSearchInput(v) {
  state.search = v;
  renderListOnly();
}

function renderListOnly() {
  const el = document.getElementById("item-list");
  if (el) el.innerHTML = renderItemList(getFiltered());
}

function render() {
  const root = document.getElementById("root");
  root.innerHTML = renderApp();
  bindEvents();
}

function renderApp() {
  if (state.view === "providers") return renderProviders();
  if (state.view === "edit") return renderEdit();
  return renderMain();
}

function renderToast() {
  return state.toast ? `<div class="toast">${escapeHtml(state.toast)}</div>` : "";
}

function renderMain() {
  const filtered = getFiltered();
  const pending = state.items.filter(it => it.needsLookup || !it.price || !it.name).length;
  const done = state.items.length - pending;
  const totalSale = state.items.filter(it => it.price).reduce((s,it) => s + it.price * 0.5 * it.qty, 0);

  return `
    ${renderToast()}
    <div class="shell">
      <input type="file" id="file-input" accept=".json,application/json" style="display:none">

      <header>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:26px">📦</span>
          <div>
            <h1>Warehouse Inventory</h1>
            <div class="subtitle">50% OFF CLEARANCE</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">${state.theme === "dark" ? "☀️" : "🌙"}</button>
          <button class="gear-btn" onclick="state.view='providers';render()">⚙️</button>
          <span class="save-dot ${state.saveStatus !== 'saved' ? state.saveStatus : ''}"></span>
        </div>
      </header>

      ${state.showInstallBanner ? `
        <div class="install-banner">
          <button onclick="dismissInstall()">✕</button>
          <strong>📲 Add to Home Screen</strong><br>
          Tap your browser's share button → "Add to Home Screen" so this app works offline & data stays forever.
        </div>
      ` : ""}

      <div class="quick-add">
        <div class="quick-add-header">
          <span class="quick-title">⚡ Quick Add</span>
          <button class="kb-toggle" onclick="setKeyboard('${state.partKeyboard==='numeric'?'text':'numeric'}')">
            ${state.partKeyboard === 'numeric' ? '🔢 123' : '🔠 ABC'}
          </button>
        </div>
        <div class="prov-row">
          ${state.providers.map(p => `
            <button class="prov-chip ${state.selectedProvider===p?'active':''}" data-prov="${escapeHtml(p)}" style="--c:${providerColor(p)}" onclick="selectProvider('${escapeHtml(p).replace(/'/g, "\\'")}')">${escapeHtml(p)}</button>
          `).join("")}
        </div>
        <div class="input-row">
          <input id="part-input" class="input flex2" type="text"
            inputmode="${state.partKeyboard === 'numeric' ? 'numeric' : 'text'}"
            ${state.partKeyboard === 'numeric' ? 'pattern="[0-9]*"' : ''}
            placeholder="Part # ${state.partKeyboard === 'numeric' ? '(numbers)' : '(text)'}"
            value="${escapeHtml(state.partNum)}"
            oninput="onPartInput(this.value)"
            onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('qty-input').focus();}">
          <input id="qty-input" class="input flex1" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Qty"
            value="${escapeHtml(state.qty)}"
            oninput="onQtyInput(this.value)"
            onkeydown="if(event.key==='Enter'){event.preventDefault();quickAdd();}">
          <button id="add-btn" class="quick-add-btn" onclick="quickAdd()" ${!state.partNum.trim() || !state.qty ? 'disabled' : ''}>＋</button>
        </div>
        <input class="input small" placeholder="📍 Location (optional)" value="${escapeHtml(state.location)}" oninput="state.location=this.value">
      </div>

      <div id="stats-bar" class="stats-row">
        <div class="stat-chip"><strong>${state.items.length}</strong> items</div>
        ${pending > 0 ? `<div class="stat-chip pending"><strong>${pending}</strong> pending</div>` : ""}
        ${done > 0 ? `<div class="stat-chip done"><strong>${done}</strong> priced</div>` : ""}
        ${totalSale > 0 ? `<div class="stat-chip done">${fmt(totalSale)}</div>` : ""}
      </div>

      ${state.items.length > 0 ? `
        <div class="filter-row">
          <input id="search-input" class="input filter-input" placeholder="Search part#…" value="${escapeHtml(state.search)}" oninput="onSearchInput(this.value)">
          <select class="input filter-select" onchange="state.filterProv=this.value;renderListOnly()">
            <option value="All" ${state.filterProv==='All'?'selected':''}>All</option>
            ${state.providers.map(p => `<option ${state.filterProv===p?'selected':''}>${escapeHtml(p)}</option>`).join("")}
          </select>
        </div>
      ` : ""}

      <div id="item-list" class="list">
        ${renderItemList(filtered)}
      </div>

      ${state.showExportModal ? renderExportModal() : ""}
      ${state.showImportModal ? renderImportModal() : ""}

      <div id="bottom-bar" class="bottom-bar">
        <button class="icon-btn" onclick="state.showImportModal=true;render()" title="Load from file">📤</button>
        ${state.items.length > 0 ? `<button class="icon-btn" onclick="clearAll()">🗑️</button>` : ""}
        <button class="export-btn" ${state.items.length === 0 ? 'disabled' : ''} onclick="${state.items.length > 0 ? 'state.showExportModal=true;render()' : ''}">
          📥 Save to File
        </button>
      </div>
    </div>
  `;
}

function renderExportModal() {
  const pending = state.items.filter(it => it.needsLookup || !it.price || !it.name).length;
  const done = state.items.length - pending;
  return `
    <div class="modal-overlay" onclick="state.showExportModal=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">📥 Save to File</div>
        <div class="modal-text">Download your inventory as a <code>.json</code> file to your phone.</div>
        <div class="tip-box">
          <strong>📌 Then in a new Claude chat:</strong>
          <ol>
            <li>Upload this file (📎 attach)</li>
            <li>Say: <em>"Look up all pending parts on the provider websites"</em></li>
            <li>Claude finds names + prices</li>
            <li>Claude builds your buyer PDF</li>
          </ol>
        </div>
        <div class="stats-box">
          <div><strong>${state.items.length}</strong> total</div>
          <div><strong>${pending}</strong> pending</div>
          <div><strong>${done}</strong> priced</div>
        </div>
        <button class="export-btn" style="margin-top:14px;width:100%" onclick="exportFile()">📥 Download Inventory File</button>
        <button class="cancel-btn" style="margin-top:8px;width:100%" onclick="state.showExportModal=false;render()">Cancel</button>
      </div>
    </div>
  `;
}

function renderImportModal() {
  return `
    <div class="modal-overlay" onclick="state.showImportModal=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">📤 Load from File</div>
        <div class="modal-text">Choose a previously saved <code>.json</code> file to load your inventory back.</div>
        ${state.items.length > 0 ? `<div class="tip-box warning">⚠️ This will <strong style="color:#fca5a5">replace</strong> your current ${state.items.length} items.</div>` : ""}
        <button class="export-btn" style="margin-top:14px;width:100%" onclick="document.getElementById('file-input').click()">📂 Choose File</button>
        <button class="cancel-btn" style="margin-top:8px;width:100%" onclick="state.showImportModal=false;render()">Cancel</button>
      </div>
    </div>
  `;
}

function renameProvider(oldName) {
  const newName = prompt("Rename provider:", oldName);
  if (!newName || newName.trim() === oldName || !newName.trim()) return;
  const trimmed = newName.trim();
  if (state.providers.includes(trimmed)) { alert("Provider already exists"); return; }
  // Update provider list
  state.providers = state.providers.map(p => p === oldName ? trimmed : p);
  saveProviders();
  // Update all items that used old name
  state.items.forEach(it => { if (it.provider === oldName) it.provider = trimmed; });
  saveItems();
  // Update selected provider if needed
  if (state.selectedProvider === oldName) state.selectedProvider = trimmed;
  showToast(`Renamed to "${trimmed}"`);
  render();
}

function renderProviders() {
  return `
    ${renderToast()}
    <div class="shell">
      <header>
        <button class="back-btn" onclick="state.view='list';render()">← Back</button>
        <h1 style="font-size:16px">Manage Providers</h1>
        <div style="width:50px"></div>
      </header>
      <div style="padding:16px">
        <p style="font-size:12px;color:var(--text-dim);margin-bottom:12px;font-family:'DM Mono',monospace">Tap name to rename · ✕ to delete</p>
        ${state.providers.map(p => `
          <div class="prov-list-row">
            <div style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer" onclick="renameProvider('${escapeHtml(p).replace(/'/g, "\\'")}')">
              <span style="width:12px;height:12px;border-radius:50%;background:${providerColor(p)};flex-shrink:0"></span>
              <span style="color:var(--text);font-size:15px">${escapeHtml(p)}</span>
              <span style="font-size:11px;color:var(--text-faint);margin-left:auto">✏️</span>
            </div>
            <button class="prov-remove" onclick="event.stopPropagation();if(confirm('Remove ${escapeHtml(p)}?'))removeProvider('${escapeHtml(p).replace(/'/g, "\\'")}')">✕</button>
          </div>
        `).join("")}
        <div style="display:flex;gap:8px;margin-top:16px">
          <input class="input" style="flex:1" placeholder="New provider name" value="${escapeHtml(state.newProvider)}" oninput="state.newProvider=this.value" onkeydown="if(event.key==='Enter')addProvider()">
          <button class="primary-btn" style="padding:10px 20px" onclick="addProvider()">Add</button>
        </div>
      </div>
    </div>
  `;
}

function renderEdit() {
  const f = state.editForm;
  return `
    ${renderToast()}
    <div class="shell">
      <header>
        <button class="back-btn" onclick="state.view='list';render()">← Back</button>
        <h1 style="font-size:16px">Edit Item</h1>
        <button class="back-btn" style="color:#ef4444" onclick="if(confirm('Delete this item?'))deleteItem('${state.editId}')">Delete</button>
      </header>
      <div class="form-wrap">
        <label class="label">Provider</label>
        <div class="prov-row">
          ${state.providers.map(p => `
            <button class="prov-chip ${f.provider===p?'active':''}" style="--c:${providerColor(p)}" onclick="state.editForm.provider='${escapeHtml(p)}';render()">${escapeHtml(p)}</button>
          `).join("")}
        </div>
        <label class="label">Part Number</label>
        <input class="input" value="${escapeHtml(f.partNumber)}" oninput="state.editForm.partNumber=this.value">
        <label class="label">Item Name</label>
        <input class="input" placeholder="(filled by Claude)" value="${escapeHtml(f.name)}" oninput="state.editForm.name=this.value">
        <div style="display:flex;gap:12px">
          <div style="flex:1">
            <label class="label">Quantity</label>
            <input class="input" type="text" inputmode="numeric" pattern="[0-9]*" value="${escapeHtml(f.qty)}" oninput="state.editForm.qty=this.value.replace(/[^0-9]/g,'')">
          </div>
          <div style="flex:1">
            <label class="label">Cost ($)</label>
            <input class="input" type="text" inputmode="decimal" placeholder="(auto)" value="${escapeHtml(f.price)}" oninput="state.editForm.price=this.value.replace(/[^0-9.]/g,'')">
          </div>
        </div>
        <label class="label">Location</label>
        <input class="input" placeholder="Aisle, shelf…" value="${escapeHtml(f.location)}" oninput="state.editForm.location=this.value">
        <label class="label">Notes</label>
        <textarea class="input" oninput="state.editForm.notes=this.value">${escapeHtml(f.notes)}</textarea>
        <button class="primary-btn" style="margin-top:20px;width:100%" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  `;
}

function bindEvents() {
  const fi = document.getElementById("file-input");
  if (fi) fi.addEventListener("change", importFile);
}

// ============== START ==============
load();
render();
</script>
</body>
</html>
